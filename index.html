<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Патимейкер</title>
<script>
  // применяем тему до отрисовки, чтобы не было мигания
  try { document.documentElement.dataset.theme = localStorage.getItem('pm-theme') || 'light'; } catch(e){}
</script>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/lists.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app">

  <!-- ============ ICON RAIL ============ -->
  <nav class="rail">
    <button class="rail-btn active" id="railHome" title="Все друзья">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
    </button>
    <div class="rail-divider"></div>
    <div id="railGroups"></div>
    <button class="rail-add" title="Новая группа">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <div class="rail-spacer"></div>
    <button class="rail-theme" id="themeBtn" title="Сменить тему"></button>
    <button class="rail-me" data-profile title="Мой профиль">СК</button>
  </nav>

  <!-- ============ FRIENDS LIST ============ -->
  <aside class="list">
    <div class="list-head">
      <div class="list-title" id="listTitle">Все друзья</div>
      <div class="list-sub" id="listSub"></div>
      <div class="group-actions" id="groupActions">
        <button class="ga-btn" id="groupJoinBtn"></button>
        <button class="ga-bell" id="groupBellBtn" title="Уведомления о днях рождения группы"></button>
      </div>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" placeholder="Поиск друзей…">
      </div>
    </div>
    <div class="list-body" id="listBody"></div>
    <div class="list-foot">
      <button class="foot-av" data-profile>СК</button>
      <div style="flex:1;min-width:0">
        <div class="foot-name">Саша Королёв</div>
        <div class="foot-role">это вы</div>
      </div>
      <button class="foot-cog" data-profile title="Настройки">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <div class="main-empty" id="mainEmpty">
      <div class="main-empty-icon">🎈</div>
      <div class="main-empty-title">Друзей пока нет</div>
      <div class="main-empty-text">Удалённых друзей можно добавить заново — здесь появится подготовка к празднику</div>
    </div>

    <header class="main-head" id="mainHead">
      <div class="main-av" id="mAv"></div>
      <div style="flex:1;min-width:0">
        <div class="main-name" id="mName"></div>
        <div class="main-birth" id="mBirth"></div>
      </div>
      <span class="cd" id="mCd"></span>
    </header>

    <div class="main-body" id="mainBody">
      <section class="chat">
        <div class="chat-head">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <b>Секретный чат</b>
          <span id="chatHint"></span>
        </div>
        <div class="chat-log" id="chatLog"></div>
        <div class="chat-input-wrap">
          <div class="chat-input">
            <input id="chatInput" placeholder="Написать сообщение…">
            <button class="send" id="sendBtn" title="Отправить">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
            </button>
          </div>
        </div>
      </section>

      <aside class="info">
        <div class="info-top">
          <div class="info-av" id="iAv"></div>
          <div>
            <div class="info-name" id="iName"></div>
            <div class="info-sub" id="iCd"></div>
          </div>
        </div>
        <div>
          <div class="info-label">В ГРУППАХ</div>
          <div class="chips" id="iGroups"></div>
        </div>
        <div>
          <div class="info-label">🎁 ВИШЛИСТ</div>
          <div class="wish" id="iWish"></div>
        </div>
      </aside>
    </div>
  </main>

  <!-- ============ PROFILE MODAL ============ -->
  <div class="overlay hidden" id="overlay">
    <div class="overlay-bg" data-close></div>
    <div class="modal">
      <div class="modal-head">
        <div style="display:flex;align-items:center;gap:13px">
          <div class="modal-av">СК</div>
          <div>
            <div class="modal-title">Мой профиль</div>
            <div class="modal-sub">И.Курбан · это вы</div>
          </div>
        </div>
        <button class="modal-x" data-close>×</button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="field" style="flex:1">
            <label>Имя</label>
            <input value="Саша Королёв">
          </div>
          <div class="field" style="width:150px">
            <label>День рождения</label>
            <input type="date" value="1998-11-24">
          </div>
        </div>
        <div>
          <div class="info-label">🎁 МОЙ ВИШЛИСТ</div>
          <div class="wish" id="myWish"></div>
        </div>
        <button class="btn-primary" data-close>Сохранить изменения</button>
      </div>
    </div>
  </div>

</div>

<!-- модели -->
<script src="js/models/User.js"></script>
<script src="js/models/Group.js"></script>
<script src="js/models/ChatMessage.js"></script>
<script src="js/models/Subscription.js"></script>
<script src="js/models/WishItem.js"></script>

<!-- хранилище -->
<script src="js/storage.js"></script>

<!-- репозитории -->
<script src="js/Repositories/BaseRepository.js"></script>
<script src="js/Repositories/UserRepository.js"></script>
<script src="js/Repositories/GroupRepository.js"></script>
<script src="js/Repositories/ChatRepository.js"></script>
<script src="js/Repositories/SubscriptionRepository.js"></script>
<script src="js/Repositories/WishlistRepository.js"></script>

<!-- сервисы -->
<script src="js/Notification.js"></script>

<!-- логика приложения -->
<script src="js/app.js"></script>
</body>
</html>
